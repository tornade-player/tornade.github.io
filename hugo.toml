baseURL = 'https://tornade.tf/'
defaultContentLanguage        = 'en'
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
disableKinds    = ['taxonomy', 'term']

[params]
  author        = "Tornade"
  twitterHandle = "@tornade_app"
  ogImage       = "/images/og-image.png"

  [params.jsonld]
    type                = "SoftwareApplication"
    name                = "Tornade"
    operatingSystem     = "macOS, Windows, Linux"
    applicationCategory = "MultimediaApplication"

[sitemap]
  changefreq = 'monthly'
  priority   = 1.0
  filename   = 'sitemap.xml'

# ── English (default — served at /) ──────────────────────────────────────────
[languages.en]
  languageCode = 'en'
  languageName = 'English'
  title        = 'Tornade Audio Player'
  weight       = 1

  [languages.en.params]
    description = "Tornade - A fast, lightweight audio player that stays out of your way. Native on macOS, Windows, Linux and Terminal."
    locale      = "en_US"

  [[languages.en.menus.main]]
    name = 'Platforms'
    url  = '/platforms/'
    weight = 10
  [[languages.en.menus.main]]
    name = 'Changelog'
    url  = '/changelog/'
    weight = 15
  [[languages.en.menus.main]]
    name = 'Contact'
    url  = '/contact/'
    weight = 20

# ── Français (served at /fr/) ─────────────────────────────────────────────────
[languages.fr]
  languageCode = 'fr'
  languageName = 'Français'
  title        = 'Tornade Audio Player'
  weight       = 2

  [languages.fr.params]
    description = "Tornade - Un lecteur audio rapide et léger qui se fait oublier. Natif sur macOS, Windows, Linux et Terminal."
    locale      = "fr_FR"

  [[languages.fr.menus.main]]
    name = 'Plateformes'
    url  = '/fr/platforms/'
    weight = 10
  [[languages.fr.menus.main]]
    name = 'Changelog'
    url  = '/fr/changelog/'
    weight = 15
  [[languages.fr.menus.main]]
    name = 'Contact'
    url  = '/fr/contact/'
    weight = 20

# ── Español (served at /es/) ──────────────────────────────────────────────────
[languages.es]
  languageCode = 'es'
  languageName = 'Español'
  title        = 'Tornade Audio Player'
  weight       = 3

  [languages.es.params]
    description = "Tornade - Un reproductor de audio rápido y ligero que no se interpone. Nativo en macOS, Windows, Linux y Terminal."
    locale      = "es_ES"

  [[languages.es.menus.main]]
    name = 'Plataformas'
    url  = '/es/platforms/'
    weight = 10
  [[languages.es.menus.main]]
    name = 'Changelog'
    url  = '/es/changelog/'
    weight = 15
  [[languages.es.menus.main]]
    name = 'Contacto'
    url  = '/es/contact/'
    weight = 20
