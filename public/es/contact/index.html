  <main class="flex-1">
    
<div class="container mx-auto px-6 py-16 md:py-24">
  <div class="max-w-xl mx-auto">

    <div class="mb-10 text-center">
      <h1 class="text-3xl font-bold mb-3">Contacto</h1>
      <p class="opacity-70">¿Una pregunta o comentario? Escríbenos.</p>
    </div>

    <form method="POST" action="https://app.sinra.dev/contact/form"
      class="flex flex-col gap-4 bg-base-200 rounded-2xl p-8 border border-base-300">

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium opacity-70">Nombre completo</label>
        <input type="text" name="name" required
          class="input input-bordered w-full bg-base-100" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium opacity-70">Email</label>
        <input type="email" name="email" required
          class="input input-bordered w-full bg-base-100" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium opacity-70">Mensaje</label>
        <textarea name="message" required rows="5"
          class="textarea textarea-bordered w-full bg-base-100 resize-none"></textarea>
      </div>

      <input type="hidden" name="return_url" value="https://tornade.tf/contact/success" />
      <input type="hidden" name="subject" value="Tornade" />

      
      <input type="text" name="_honeypot" style="display:none" tabindex="-1" autocomplete="off" />

      <button type="submit" class="btn bg-transparent border border-primary text-primary hover:bg-primary hover:text-primary-content w-full mt-2">
        Enviar
      </button>
    </form>

  </div>
