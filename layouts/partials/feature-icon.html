{{- /* Feature Icon SVG Generator for DaisyUI Dim Theme */ -}}
{{- $icon := . -}}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
  {{- if eq $icon "scan" -}}
    {{- /* Directory/Folder Scan */ -}}
    <path d="M3 7v6h18V7"/>
    <path d="M3 7a2 2 0 0 1 2-2h5l2 3h6a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/>
    <path d="M9 12h6M9 16h6"/>
  {{- else if eq $icon "formats" -}}
    {{- /* Musical Note / Audio */ -}}
    <path d="M9 18V5l12-2v13A4 4 0 1 1 15 12A4 4 0 0 0 9 18z"/>
  {{- else if eq $icon "search" -}}
    {{- /* Search / Magnifying Glass */ -}}
    <circle cx="11" cy="11" r="8"/>
    <path d="m21 21-4.35-4.35"/>
  {{- else if eq $icon "folder" -}}
    {{- /* Folder / Source */ -}}
    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
  {{- else if eq $icon "duplicate" -}}
    {{- /* Copy / Duplicate */ -}}
    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
    <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
  {{- else if eq $icon "play" -}}
    {{- /* Play / Playback */ -}}
    <polygon points="5 3 19 12 5 21 5 3"/>
  {{- else if eq $icon "skip" -}}
    {{- /* Skip / Next */ -}}
    <path d="M5 4l14 8-14 8V4z"/>
    <path d="M19 4v16"/>
  {{- else if eq $icon "queue" -}}
    {{- /* List / Queue */ -}}
    <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
  {{- else if eq $icon "shuffle" -}}
    {{- /* Shuffle */ -}}
    <polyline points="23 1 23 7 17 7"/>
    <polyline points="1 23 1 17 7 17"/>
    <path d="M20.49 9a9 9 0 0 0-12.12-5.36L9 9M3.5 14a9 9 0 0 0 15.85 2.07L15 15"/>
  {{- else if eq $icon "volume" -}}
    {{- /* Volume */ -}}
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
  {{- else if eq $icon "hifi" -}}
    {{- /* High-Fi / Sound Wave */ -}}
    <path d="M12 1a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4z"/>
    <path d="M3 9a9 9 0 0 1 18 0"/>
  {{- else if eq $icon "list" -}}
    {{- /* List / Playlist */ -}}
    <line x1="8" y1="6" x2="21" y2="6"/>
    <line x1="8" y1="12" x2="21" y2="12"/>
    <line x1="8" y1="18" x2="21" y2="18"/>
    <line x1="3" y1="6" x2="3.01" y2="6"/>
    <line x1="3" y1="12" x2="3.01" y2="12"/>
    <line x1="3" y1="18" x2="3.01" y2="18"/>
  {{- else if eq $icon "import" -}}
    {{- /* Import / Download */ -}}
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="7 10 12 15 17 10"/>
    <line x1="12" y1="15" x2="12" y2="3"/>
  {{- else if eq $icon "star" -}}
    {{- /* Star / Rating */ -}}
    <polygon points="12 2 15.09 10.26 24 10.27 17.18 16.73 20.09 25 12 19.54 3.91 25 6.82 16.73 0 10.27 8.91 10.26 12 2"/>
  {{- else if eq $icon "database" -}}
    {{- /* Database */ -}}
    <ellipse cx="12" cy="5" rx="9" ry="3"/>
    <path d="M3 5v14a9 3 0 0 0 18 0V5"/>
    <path d="M3 12a9 3 0 0 0 18 0"/>
  {{- else if eq $icon "save" -}}
    {{- /* Save / Persistence */ -}}
    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
    <polyline points="17 21 17 13 7 13 7 21"/>
    <polyline points="7 3 7 8 15 8"/>
  {{- else if eq $icon "heart" -}}
    {{- /* Heart / Favorites */ -}}
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  {{- else -}}
    {{- /* Default - Sparkle */ -}}
    <circle cx="12" cy="12" r="1"/>
    <path d="M4 12h16M12 4v16"/>
    <path d="M7 7h10v10H7zM7 17h10"/>
  {{- end -}}
</svg>
