{{ define "main" }}
<div class="container mx-auto px-6 py-16 max-w-3xl">
  <h1 class="text-4xl font-bold mb-4">{{ .Title }}</h1>
  {{ with .Description }}<p class="text-lg opacity-75 mb-10">{{ . }}</p>{{ end }}
  <div class="prose prose-invert max-w-none">
    {{ .Content }}
  </div>
</div>
{{ end }}
