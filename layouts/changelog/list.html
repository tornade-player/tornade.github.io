{{ define "main" }}
<div class="container mx-auto px-6 py-16 max-w-3xl">

  <!-- Header -->
  <div class="mb-14">
    <h1 class="text-4xl font-bold mb-3">{{ .Title }}</h1>
    {{ with .Description }}<p class="opacity-55 text-base max-w-xl">{{ . }}</p>{{ end }}
  </div>

  <!-- Changelog content with timeline styling -->
  <div class="changelog-body relative pl-7">
    <!-- Vertical timeline line -->
    <div class="absolute left-[6px] top-2 bottom-2 w-px bg-base-300"></div>
    {{ .Content }}
  </div>

</div>

<style>
/* Timeline dot per version */
.changelog-body h2 {
  position: relative;
  font-size: 1.15rem;
  font-weight: 700;
  margin-top: 3rem;
  margin-bottom: 1.25rem;
  color: oklch(var(--bc));
}
.changelog-body h2:first-child {
  margin-top: 0;
}
.changelog-body h2::before {
  content: '';
  position: absolute;
  left: calc(-1.75rem + 1px);
  top: 50%;
  transform: translate(-50%, -50%);
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background-color: oklch(var(--p));
  border: 2px solid oklch(var(--b1));
  box-shadow: 0 0 0 3px oklch(var(--p) / 0.2);
}
.changelog-body h2:not(:first-child)::before {
  background-color: oklch(var(--b3));
  box-shadow: none;
}

/* Section labels: Added / Changed / Fixed */
.changelog-body h3 {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 1rem;
  margin-bottom: 0.5rem;
  padding: 0.2rem 0.6rem;
  border-radius: 0.375rem;
  background-color: oklch(var(--b2));
  color: oklch(var(--bc) / 0.65);
  border: 1px solid oklch(var(--b3));
}

/* Lists */
.changelog-body ul {
  list-style: none;
  padding: 0;
  margin: 0 0 0.5rem 0;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.changelog-body li {
  position: relative;
  padding-left: 1rem;
  font-size: 0.9rem;
  opacity: 0.8;
  line-height: 1.55;
}
.changelog-body li::before {
  content: '—';
  position: absolute;
  left: 0;
  opacity: 0.35;
  font-size: 0.8rem;
}
.changelog-body li code {
  font-size: 0.82em;
  background: oklch(var(--b3));
  padding: 0.1em 0.35em;
  border-radius: 0.25rem;
  font-family: ui-monospace, monospace;
}

/* Separator between versions */
.changelog-body hr {
  display: none;
}
</style>
{{ end }}
