{{ define "main" }}
<div class="container mx-auto px-6 py-24 md:py-32">
  <div class="max-w-md mx-auto text-center flex flex-col items-center gap-6">

    <div class="w-16 h-16 rounded-full bg-success/10 text-success flex items-center justify-center text-3xl">
      <i class="fa-solid fa-check"></i>
    </div>

    <h1 class="text-3xl font-bold">{{ i18n "contact_success_title" }}</h1>
    <p class="opacity-70 text-lg">{{ i18n "contact_success_message" }}</p>

    <a href="{{ site.Home.Permalink }}" class="btn btn-primary mt-4">
      {{ i18n "contact_success_back" }}
    </a>

  </div>
</div>
{{ end }}
