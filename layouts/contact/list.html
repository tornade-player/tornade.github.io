{{ define "main" }}
<div class="container mx-auto px-6 py-16 md:py-24">
  <div class="max-w-xl mx-auto">

    <div class="mb-10 text-center">
      <h1 class="text-3xl font-bold mb-3">{{ i18n "contact_title" }}</h1>
      <p class="opacity-70">{{ i18n "contact_subtitle" }}</p>
    </div>

    <form method="POST" action="https://app.sinra.dev/contact/form"
      class="flex flex-col gap-4 bg-base-200 rounded-2xl p-8 border border-base-300">

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium opacity-70">{{ i18n "contact_fullname" }}</label>
        <input type="text" name="name" required
          class="input input-bordered w-full bg-base-100" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium opacity-70">{{ i18n "contact_email" }}</label>
        <input type="email" name="email" required
          class="input input-bordered w-full bg-base-100" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium opacity-70">{{ i18n "contact_message" }}</label>
        <textarea name="message" required rows="5"
          class="textarea textarea-bordered w-full bg-base-100 resize-none"></textarea>
      </div>

      <input type="hidden" name="return_url" value="https://tornade.tf/contact/success" />
      <input type="hidden" name="subject" value="Tornade" />

      <!-- Honeypot anti-spam -->
      <input type="text" name="_honeypot" style="display:none" tabindex="-1" autocomplete="off" />

      <button type="submit" class="btn btn-outline btn-primary w-full mt-2">
        {{ i18n "contact_send" }}
      </button>
    </form>

  </div>
</div>
{{ end }}
